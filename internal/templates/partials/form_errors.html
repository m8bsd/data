{{define "form_errors"}}
{{if .Errors}}
<div class="alert alert-danger d-flex align-items-start gap-2 mb-4" role="alert">
  <i class="bi bi-exclamation-triangle-fill flex-shrink-0 mt-1"></i>
  <div>
    <strong>Please fix the following:</strong>
    <ul class="mb-0 mt-1">
      {{range .Errors}}
      <li>{{.}}</li>
      {{end}}
    </ul>
  </div>
</div>
{{end}}
{{end}}
