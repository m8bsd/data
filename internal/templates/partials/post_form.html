{{define "post_form"}}
<div class="mb-3">
  <label for="title" class="form-label fw-semibold">Title <span class="text-danger">*</span></label>
  <input
    type="text"
    class="form-control bg-dark border-secondary text-light"
    id="title"
    name="title"
    placeholder="Your post title..."
    value="{{if .Post}}{{.Post.Title}}{{end}}"
    required
    autofocus
  >
</div>

<div class="mb-3">
  <label for="author" class="form-label fw-semibold">Author</label>
  <input
    type="text"
    class="form-control bg-dark border-secondary text-light"
    id="author"
    name="author"
    placeholder="Your name"
    value="{{if .Post}}{{.Post.Author}}{{else}}Admin{{end}}"
  >
</div>

<div class="mb-3">
  <label for="excerpt" class="form-label fw-semibold">
    Excerpt
    <span class="text-secondary fw-normal small ms-1">(optional — shown on cards)</span>
  </label>
  <input
    type="text"
    class="form-control bg-dark border-secondary text-light"
    id="excerpt"
    name="excerpt"
    placeholder="Short summary of your post..."
    value="{{if .Post}}{{.Post.Excerpt}}{{end}}"
  >
</div>

<div class="mb-3">
  <label for="content" class="form-label fw-semibold">Content <span class="text-danger">*</span></label>
  <textarea
    class="form-control bg-dark border-secondary text-light font-monospace"
    id="content"
    name="content"
    rows="14"
    placeholder="Write your post content here... (Markdown not required, line breaks are preserved)"
    required
  >{{if .Post}}{{.Post.Content}}{{end}}</textarea>
  <div class="form-text text-secondary">Line breaks will be preserved in the post.</div>
</div>
{{end}}
