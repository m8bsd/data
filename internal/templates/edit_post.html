{{define "content"}}
<div class="row justify-content-center">
  <div class="col-lg-8">

    <nav aria-label="breadcrumb" class="mb-4">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="/" class="text-warning text-decoration-none">Home</a></li>
        <li class="breadcrumb-item"><a href="/posts/{{.Post.Slug}}" class="text-warning text-decoration-none">{{.Post.Title}}</a></li>
        <li class="breadcrumb-item active text-secondary">Edit</li>
      </ol>
    </nav>

    <div class="card border-secondary bg-dark">
      <div class="card-header border-secondary d-flex align-items-center gap-2 py-3">
        <i class="bi bi-pencil-fill text-warning fs-5"></i>
        <h4 class="mb-0 fw-bold">Edit Post</h4>
      </div>
      <div class="card-body p-4">

        <div id="form-errors"></div>

        <form
          hx-post="/posts/{{.Post.ID}}/update"
          hx-target="#form-errors"
          hx-swap="innerHTML"
        >
          {{template "post_form" .}}

          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-warning fw-semibold px-4">
              <i class="bi bi-check-lg me-1"></i>Save Changes
            </button>
            <a href="/posts/{{.Post.Slug}}" class="btn btn-outline-secondary">Cancel</a>
            <button
              type="button"
              class="btn btn-outline-danger ms-auto"
              hx-post="/posts/{{.Post.ID}}/delete"
              hx-confirm="Delete this post? This cannot be undone."
            >
              <i class="bi bi-trash me-1"></i>Delete
            </button>
          </div>
        </form>

      </div>
    </div>
  </div>
</div>
{{end}}
