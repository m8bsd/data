{{define "content"}}
<div class="row justify-content-center">
  <div class="col-lg-8">

    <nav aria-label="breadcrumb" class="mb-4">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="/" class="text-warning text-decoration-none">Home</a></li>
        <li class="breadcrumb-item active text-secondary">New Post</li>
      </ol>
    </nav>

    <div class="card border-secondary bg-dark">
      <div class="card-header border-secondary d-flex align-items-center gap-2 py-3">
        <i class="bi bi-plus-circle-fill text-warning fs-5"></i>
        <h4 class="mb-0 fw-bold">Create New Post</h4>
      </div>
      <div class="card-body p-4">

        <!-- Error container (HTMX target) -->
        <div id="form-errors"></div>

        <form
          hx-post="/posts"
          hx-target="#form-errors"
          hx-swap="innerHTML"
        >
          {{template "post_form" .}}

          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-warning fw-semibold px-4">
              <i class="bi bi-check-lg me-1"></i>Publish Post
            </button>
            <a href="/" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>

      </div>
    </div>
  </div>
</div>
{{end}}
