{{define "layout"}}
<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Title}} — Inkwell</title>

  <!-- Bootstrap 5.3 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  <!-- Custom styles -->
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark border-bottom border-secondary sticky-top" style="background: rgba(13,17,23,0.95); backdrop-filter: blur(12px);">
    <div class="container">
      <a class="navbar-brand fw-bold fs-4" href="/">
        <i class="bi bi-pen-fill text-warning me-2"></i>Inkwell
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto align-items-center gap-2">
          <li class="nav-item">
            <a class="nav-link" href="/"><i class="bi bi-house me-1"></i>Home</a>
          </li>
          <li class="nav-item">
            <a class="btn btn-warning btn-sm fw-semibold" href="/posts/new">
              <i class="bi bi-plus-lg me-1"></i>New Post
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Main content -->
  <main class="container py-5">
    {{template "content" .}}
  </main>

  <!-- Footer -->
  <footer class="border-top border-secondary mt-auto py-4">
    <div class="container text-center text-secondary small">
      <span>Built with Go + HTMX + Bootstrap + Neon</span>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/app.js"></script>
</body>
</html>
{{end}}
